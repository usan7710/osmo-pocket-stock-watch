name: Stock Watch

on:
  workflow_dispatch:
    inputs:
      send_current_status:
        description: "現在の在庫状況をDiscordへ送る"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: stock-watch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run stock watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          SEND_CURRENT_STATUS: ${{ inputs.send_current_status || false }}
        run: |
          if [ -f config.yaml ]; then
            CONFIG_FILE=config.yaml
          else
            CONFIG_FILE=config.example.yaml
          fi

          EXTRA_ARGS=""
          if [ "$SEND_CURRENT_STATUS" = "true" ]; then
            EXTRA_ARGS="--notify-current"
          fi

          python main.py --config "$CONFIG_FILE" --state state.json $EXTRA_ARGS

      - name: Persist state
        if: always()
        run: |
          if [ ! -f state.json ]; then
            echo "state.json was not created."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- state.json)" ]; then
            echo "No state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update stock watcher state [skip ci]"
          git push
