      - site: "Amazon"
        enabled: false
        provider: "keepa"
        asin: "B0GKPH85VZ"
        url: "https://www.amazon.co.jp/dp/B0GKPH85VZ"
        keepa_domain: 5
        keepa_price_indexes:
          - 0
          - 1

