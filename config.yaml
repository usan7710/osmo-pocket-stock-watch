settings:
  timezone: "Asia/Tokyo"
  conflict_policy: "out_of_stock_wins"
  request:
    timeout_seconds: 20
    retries: 2
    backoff_seconds: 3
    user_agent: "Mozilla/5.0 (compatible; osmo-pocket-stock-watch/1.0)"

